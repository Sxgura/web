<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Downloader | Sxgura Inc</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#000;
color:#fff;
display:block;
min-height:100vh;
overflow-y:auto;
overflow-x:hidden;
}


/* CONTENEDOR */

.container{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* CAJA */

.box{
background:rgba(0,0,0,0.65);
backdrop-filter:blur(12px);
padding:30px;
border-radius:22px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,0.25);
animation:fadeIn 1s ease, glow 3s infinite alternate;
border:1px solid rgba(255,0,0,.15);
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
}

}

@keyframes glow{

from{
box-shadow:0 0 15px #ff0000;
}

to{
box-shadow:0 0 30px #990000;
}

}

.box h2{
margin-bottom:20px;
color:#ff0000;
font-size:24px;
text-shadow:0 0 12px rgba(255,0,0,.5);
}

/* INPUT */

.input-box{
position:relative;
}

input{
width:100%;
padding:12px 45px 12px 12px;
border:none;
border-radius:12px;
background:#120000;
color:#fff;
box-sizing:border-box;
outline:none;
border:1px solid #220000;
}

input::placeholder{
color:#888;
}

.clear-btn{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
background:#b30000;
width:22px;
height:22px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:13px;
}

/* BOTÓN */

button{
margin-top:15px;
width:100%;
padding:12px;
background:linear-gradient(45deg,#ff0000,#990000);
border:none;
border-radius:12px;
cursor:pointer;
color:#fff;
font-weight:bold;
font-size:15px;
transition:.25s;
}

button:hover{
box-shadow:0 0 15px #ff0000;
transform:scale(1.02);
}

/* VIDEO */

video{
width:220px;
margin-top:15px;
border-radius:12px;
animation:fadeIn .6s ease;
border:1px solid #330000;
}

/* LINK */

a{
display:block;
margin-top:10px;
padding:10px;
background:#b30000;
color:#fff;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:.25s;
}

a:hover{
background:#ff0000;
box-shadow:0 0 15px rgba(255,0,0,.4);
}

/* FOOTER */

.footer{
margin-top:20px;
font-size:11px;
color:#888;
opacity:.7;
}

/* PARTÍCULAS */

.particle{
position:fixed;
width:6px;
height:6px;
background:linear-gradient(#ff0000,#990000);
border-radius:50%;
opacity:.3;
bottom:-10px;
animation:float linear infinite;
}

@keyframes float{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-120vh);
}

}

</style>
</head>

<body>

<script>

/* PARTÍCULAS */

for(let i=0;i<70;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=
(6+Math.random()*10)+"s";

p.style.opacity=Math.random();

document.body.appendChild(p);

}

</script>

<div class="container">

<div class="box">

<h2>
Instagram Downloader
</h2>

<div class="input-box">

<input 
id="link"
placeholder="Pegar enlace aquí"
>

<span 
class="clear-btn"
onclick="limpiar()"
>
✖
</span>

</div>

<button onclick="descargar()">
Descargar
</button>

<div id="resultado"></div>

<div class="footer">
Sxgura Inc
</div>

</div>

</div>

<script>

function limpiar(){

document.getElementById("link").value="";

document.getElementById("resultado").innerHTML="";

}

async function descargar(){

const link =
document.getElementById("link").value;

const resDiv =
document.getElementById("resultado");

if(!link){

alert("Pega un enlace");

return;

}

resDiv.innerHTML="Cargando...";

try{

const api =
"https://api.deline.web.id/downloader/ig?url="
+
encodeURIComponent(link);

const res = await fetch(api);

const data = await res.json();

let video =
data?.result?.media?.videos?.[0];

if(video){

resDiv.innerHTML = `

<video controls src="${video}"></video>

<a href="${video}" download>
⬇ Descargar
</a>

`;

}else{

resDiv.innerHTML="❌ No encontrado";

}

}catch{

resDiv.innerHTML="❌ Error";

}

}

</script>

</body>
</html>
