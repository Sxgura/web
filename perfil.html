<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivan Segura • Perfil Oficial</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

:root{
    --bg:#000;
    --blue:#1976ff;
    --card:#080808;
    --border:#232323;
    --text:#fff;
    --sub:#9ca3af;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}


a{
    text-decoration:none;
    color:inherit;
}

.container{
    width:100%;
    max-width:520px;
    margin:auto;
    min-height:100vh;
    background:#000;
}

/* CABECERA */

.cover{
    width:100%;
    height:160px;
    background:var(--blue);
}

/* PERFIL */

.profile{
    margin-top:-55px;
    text-align:center;
}

.avatar-box{
    position:relative;
    width:112px;
    margin:auto;
}

.avatar{
    width:112px;
    height:112px;
    border-radius:50%;
    border:3px solid var(--blue);
    background-size:cover;
    background-position:center;
    box-shadow:0 0 0 5px #000;
}

.avatar-badge{
    position:absolute;
    top:4px;
    left:-4px;
    width:30px;
    height:30px;
    border-radius:50%;
    background:var(--blue);
    border:2px solid #000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.avatar-badge svg{
    width:14px;
    height:14px;
    fill:#fff;
}

.profile-name{
    margin-top:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:4px;
    font-size:24px;
    font-weight:700;
}

.verify img{
    width:18px;
    height:18px;
    display:block;
}

.profile-status{
    margin-top:6px;
    color:var(--sub);
    font-size:14px;
}

.status-dot{
    width:7px;
    height:7px;
    display:inline-block;
    background:#1ed760;
    border-radius:50%;
    margin-right:5px;
}

/* REDES */

.social-grid{
    margin:22px 12px 0;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

.social-item{
    text-align:center;
}

.social-btn{
    width:36px;
    height:36px;
    margin:auto;
    border-radius:50%;
    background:#0b0b0b;
    border:1px solid #2b2b2b;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.2s;
}

.social-btn:hover{
    transform:translateY(-2px);
    border-color:#4a4a4a;
}

.social-btn svg{
    width:18px;
    height:18px;
    fill:#fff;
}

.social-label{
    margin-top:5px;
    font-size:9px;
    color:#d0d0d0;
}

/* TARJETA */

.comment-card{
    margin:18px 12px;
    padding:12px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
}

.comment-title{
    color:#d5d5d5;
    font-size:13px;
    margin-bottom:12px;
    font-weight:600;
}

.comment-box{
    display:flex;
    gap:10px;
}

.comment-avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background-size:cover;
    background-position:center;
    flex-shrink:0;
}

.comment-content{
    flex:1;
}

.comment-user{
    display:flex;
    align-items:center;
    gap:3px;
    color:#b7bcc5;
    font-size:11px;
    margin-bottom:3px;
}

.comment-user img{
    width:13px;
    height:13px;
}

.comment-text{
    font-size:13px;
    font-weight:600;
    line-height:1.25;
    color:#fff;
}

/* FOOTER */

.footer{
    text-align:center;
    color:#666;
    font-size:12px;
    padding:22px 10px;
}

.avatar,
.social-btn{
    transition:.2s;
}

.avatar:hover{
    transform:scale(1.02);
}

@media(max-width:460px){

    .profile-name{
        font-size:22px;
    }

    .social-btn{
        width:34px;
        height:34px;
    }

    .social-btn svg{
        width:16px;
        height:16px;
    }
}
</style>
</head>

<body>

<script>

/* ==================================================
   CONFIGURACIÓN DE ENLACES
   Solo cambia los enlaces entre las comillas.
================================================== */


document.getElementById("link-whatsapp").target  = "_blank";
document.getElementById("link-facebook").target  = "_blank";
document.getElementById("link-instagram").target = "_blank";
document.getElementById("link-telegram").target  = "_blank";
document.getElementById("link-canal").target     = "_blank";

/* ==================================================
   ANIMACIÓN DE ENTRADA
================================================== */

window.addEventListener("load",()=>{


document.querySelector(".profile").animate(
        [
            {
                opacity:0,
                transform:"translateY(18px)"
            },
            {
                opacity:1,
                transform:"translateY(0)"
            }
        ],
        {
            duration:500,
            fill:"forwards"
        }
    );

});


</script>
