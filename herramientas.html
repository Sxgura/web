<style>
:root{
    --bg:#000000;
    --border:rgba(0,140,255,.24);
    --text:#ffffff;
    --muted:rgba(255,255,255,.82);
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
    min-height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
}

.page{
    width:100%;
    display:flex;
    justify-content:center;
    padding:14px 10px 28px;
}

.stack{
    width:100%;
    max-width:320px;
}

/* Título sin borde */
.title{
    font-size:20px;
    font-weight:800;
    letter-spacing:.8px;
    text-align:center;
    padding:10px 0 4px;
    border:none;
    background:none;
}

/* Texto descriptivo sin borde */
.text{
    font-size:12.8px;
    line-height:1.5;
    color:var(--muted);
    text-align:center;
    padding:6px 4px 10px;
    border:none;
    background:none;
}

/* Contenedor de botones SIN borde, sin fondo, sin padding extra */
.links{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
    margin:6px 0 0;
}

.btn{
    width:260px;
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 12px;
    border-radius:12px;
    text-decoration:none;
    color:var(--text);
    background:#000000;
    border:1px solid var(--border);
    box-shadow:
        0 0 0 1px rgba(0,0,0,.14) inset,
        0 4px 10px rgba(0,0,0,.22);
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
}

.btn:hover{
    transform:translateY(-1px) scale(1.01);
    border-color:rgba(0,140,255,.44);
    background:#0a0a0a;
}

.icon{
    width:22px;
    height:22px;
    flex:0 0 22px;
    display:block;
    object-fit:contain;
}

.label{
    font-size:14px;
    font-weight:600;
    line-height:1.1;
}
