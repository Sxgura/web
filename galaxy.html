<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Shooter</title>
<style>
body{margin:0;background:#04040c;color:white;font-family:Arial;display:flex;flex-direction:column;align-items:center}
canvas{background:radial-gradient(circle at center,#0a0a1a,#000);border:2px solid #6a00ff;border-radius:12px;margin-top:10px}
#ui{margin-top:10px;display:none;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:6px;font-size:14px}
button{padding:6px 10px;border:none;border-radius:6px;background:#222;color:white;margin-left:5px}
#footer{margin-top:10px;font-size:12px;opacity:0.6;display:none}

#loader{position:fixed;inset:0;background:radial-gradient(circle,#050510,#000);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10}
.title{font-size:32px;color:#00eaff;letter-spacing:2px;animation:glow 1.5s infinite alternate}
.subtitle{margin-top:8px;opacity:0.7}
.bar{margin-top:20px;width:200px;height:6px;background:#111;border-radius:10px;overflow:hidden}
.fill{height:100%;width:0%;background:linear-gradient(90deg,#00eaff,#6a00ff);animation:load 4s linear forwards}
@keyframes glow{from{opacity:0.4}to{opacity:1}}
@keyframes load{from{width:0%}to{width:100%}}
</style>
</head>
<body>

<div id="loader">
  <div class="title">GALAXY SHOOTER</div>
  <div class="subtitle">By Sxgura Inc</div>
  <div class="bar"><div class="fill"></div></div>
</div>

<div id="ui">
  Puntos: <b id="score">0</b>
  | ⏱️ <b id="time">00:00</b>
  <button onclick="toggleSound()" id="soundBtn">🔊 Sonido</button>
  <button onclick="restart()">Reiniciar</button>
  <button onclick="togglePause()" id="pauseBtn">Pausar</button>
</div>

<canvas id="game" width="400" height="600" style="display:none"></canvas>
<div id="footer">By Sxgura Inc</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const pauseBtn = document.getElementById("pauseBtn");
const soundBtn = document.getElementById("soundBtn");

let player, bullets, enemies, particles, stars;
let score, gameOver, paused;
let startTime, elapsed;
let enemySpeed = 2.5;
let shootInterval = 200;
let rapidFire=false, rapidTimer=0, lastBoost=0;
let soundEnabled=false;
let audioCtx, bgOsc, bgGain;

function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playLaser(){
  if(!soundEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function playExplosion(){
  if(!soundEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(120, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
  osc.stop(audioCtx.currentTime + 0.2);
}

function startBackground(){
  if(!soundEnabled) return;
  bgOsc = audioCtx.createOscillator();
  bgGain = audioCtx.createGain();
  bgOsc.type = "sine";
  bgOsc.frequency.setValueAtTime(80, audioCtx.currentTime);
  bgGain.gain.setValueAtTime(0.01, audioCtx.currentTime);
  bgOsc.connect(bgGain);
  bgGain.connect(audioCtx.destination);
  bgOsc.start();
}

function stopBackground(){
  if(bgOsc){ bgOsc.stop(); bgOsc=null; }
}

function toggleSound(){
  initAudio();
  soundEnabled = !soundEnabled;
  soundBtn.textContent = soundEnabled ? "🔊 Sonido ON" : "🔇 Sonido OFF";
  if(soundEnabled){ startBackground(); } else { stopBackground(); }
}

function init(){
  player = {x:200, y:520};
  bullets = [];
  enemies = [];
  particles = [];
  stars = Array.from({length:80},()=>({x:Math.random()*400,y:Math.random()*600,s:Math.random()*2}));
  score = 0;
  gameOver = false;
  paused = false;
  startTime = Date.now();
  elapsed = 0;
  rapidFire=false;
  lastBoost=0;
}

function spawnEnemy(){
  if(!paused && !gameOver){
    enemies.push({x: Math.random()*360,y: -20,size: 18,speed: enemySpeed});
  }
}

function shoot(){
  if(!gameOver && !paused){
    bullets.push({x:player.x-8,y:player.y});
    bullets.push({x:player.x+8,y:player.y});
    playLaser();
  }
}

setInterval(()=>shoot(), shootInterval);
setInterval(spawnEnemy,700);

function update(){
  if(gameOver || paused) return;

  elapsed = Math.floor((Date.now() - startTime)/1000);
  let min = Math.floor(elapsed/60);
  let sec = elapsed % 60;
  timeEl.textContent = String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');

  if(score>0 && score % 30 === 0 && score !== lastBoost){
    rapidFire=true;
    rapidTimer=Date.now();
    lastBoost=score;
  }

  if(rapidFire && Date.now() - rapidTimer < 10000){
    shootInterval = 70;
  }else{
    rapidFire=false;
    shootInterval = 200;
  }

  bullets.forEach(b=>b.y-=14);
  bullets = bullets.filter(b=>b.y>-20);

  enemies.forEach(e=>e.y+=e.speed);
  enemies = enemies.filter(e=>e.y<600);

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});
  particles = particles.filter(p=>p.life>0);

  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(Math.hypot(b.x-e.x,b.y-e.y)<18){
        playExplosion();
        for(let i=0;i<10;i++) particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20});
        enemies.splice(ei,1);
        bullets.splice(bi,1);
        score++;
        scoreEl.textContent = score;
      }
    });
  });

  enemies.forEach(e=>{
    if(Math.hypot(player.x-e.x,player.y-e.y)<22){ gameOver=true; }
  });
}

function draw(){
  ctx.clearRect(0,0,400,600);

  stars.forEach(s=>{s.y+=0.5+s.s;if(s.y>600)s.y=0;ctx.fillStyle="white";ctx.fillRect(s.x,s.y,s.s,s.s)});

  ctx.fillStyle="#00aaff";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y-28);
  ctx.quadraticCurveTo(player.x-18, player.y+10, player.x, player.y+5);
  ctx.quadraticCurveTo(player.x+18, player.y+10, player.x, player.y-28);
  ctx.fill();

  bullets.forEach(b=>{
    let grad = ctx.createLinearGradient(b.x,b.y,b.x,b.y+20);
    grad.addColorStop(0,"#00ffff");
    grad.addColorStop(1,"rgba(0,255,255,0)");
    ctx.strokeStyle = grad;
    ctx.lineWidth = 4;
    ctx.shadowColor = "#00ffff";
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x,b.y+15);
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  enemies.forEach(e=>{
    let grad = ctx.createRadialGradient(e.x,e.y,2,e.x,e.y,18);
    grad.addColorStop(0,"#ff8080");
    grad.addColorStop(1,"#ff0033");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x,e.y,15,0,Math.PI*2);
    ctx.fill();
  });

  particles.forEach(p=>{ctx.fillStyle="#ffaa00";ctx.fillRect(p.x,p.y,3,3)});

  if(gameOver){ctx.fillStyle="white";ctx.font="30px Arial";ctx.textAlign="center";ctx.fillText("GAME OVER",200,300)}
  if(paused){ctx.fillStyle="white";ctx.font="25px Arial";ctx.textAlign="center";ctx.fillText("PAUSA",200,300)}
}

function loop(){update();draw();requestAnimationFrame(loop)}

canvas.addEventListener("touchmove", e=>{ player.x = e.touches[0].clientX - canvas.offsetLeft; });
window.addEventListener("mousemove", e=>{ player.x = e.clientX - canvas.offsetLeft; });

function togglePause(){paused=!paused;pauseBtn.textContent=paused?"Continuar":"Pausar";if(!paused){startTime=Date.now()-elapsed*1000}}
function restart(){init()}

setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("ui").style.display="block";
  canvas.style.display="block";
  document.getElementById("footer").style.display="block";
  init();loop();
},4000);
</script>

</body>
</html>
